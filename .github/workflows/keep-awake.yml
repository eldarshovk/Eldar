name: Keep Supabase Awake

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health")
          echo "Supabase health HTTP code: $HTTP_CODE"
          test "$HTTP_CODE" = "200"
